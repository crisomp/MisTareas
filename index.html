<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduControl - Gestión Académica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .modal-overlay { display: none; }
        .modal-overlay.active { display: flex; }
        .task-completed { text-decoration: line-through; color: #94a3b8; }
        
        /* Optimización de scrollbar para móvil */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* Mejora de área táctil */
        button, select, input {
            min-height: 44px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-2xl mx-auto p-4 md:p-8 pb-20">
        <!-- Encabezado -->
        <header class="mb-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-slate-900 rounded-xl text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">EduControl</h1>
                    <div class="flex items-center gap-2">
                        <p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Móvil & Escritorio</p>
                        <span id="notifStatus" class="hidden h-2 w-2 rounded-full bg-emerald-500 animate-pulse-soft"></span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="requestNotifBtn" class="p-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 active:scale-95 transition-all shadow-sm" aria-label="Notificaciones">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </button>
                <button id="openSubjectBtn" class="p-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 active:scale-95 transition-all shadow-sm" aria-label="Materias">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                </button>
            </div>
        </header>

        <!-- Resumen de Progreso -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 flex items-center gap-5">
            <div class="h-14 w-14 flex-shrink-0 relative">
                <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                    <circle cx="18" cy="18" r="16" fill="none" class="stroke-slate-100" stroke-width="3.5"></circle>
                    <circle id="progressCircle" cx="18" cy="18" r="16" fill="none" class="stroke-slate-900 transition-all duration-1000" stroke-width="3.5" stroke-dasharray="0, 100" stroke-linecap="round"></circle>
                </svg>
                <span id="progressText" class="absolute inset-0 flex items-center justify-center text-[10px] font-black">0%</span>
            </div>
            <div>
                <h2 class="text-base font-bold text-slate-800">Mi Avance</h2>
                <p id="statsSubtitle" class="text-slate-500 text-xs">Calculando tareas...</p>
            </div>
        </div>

        <!-- Formulario de Tarea -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
            <div class="p-4 space-y-3 bg-slate-50/50">
                <div class="relative flex items-center">
                    <input type="text" id="taskInput" placeholder="Nueva tarea pendiente..." class="w-full pl-4 pr-12 py-3.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-slate-900 focus:border-transparent outline-none transition-all text-sm">
                    <button id="addTaskBtn" class="absolute right-1.5 p-2 bg-slate-900 text-white rounded-lg active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-xl border border-slate-200">
                        <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <input type="date" id="dateInput" class="w-full text-[11px] font-semibold text-slate-600 outline-none bg-transparent cursor-pointer">
                    </div>
                    <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-xl border border-slate-200">
                        <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path></svg>
                        <select id="subjectSelect" class="w-full text-[11px] font-semibold text-slate-600 outline-none bg-transparent cursor-pointer appearance-none">
                            <option value="">Materia</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Filtros Móviles -->
            <div class="flex p-2 gap-1 bg-white border-b border-slate-100" id="filters">
                <button data-filter="all" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all bg-slate-900 text-white">Todas</button>
                <button data-filter="pending" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all bg-slate-100 text-slate-500">Pendientes</button>
                <button data-filter="completed" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all bg-slate-100 text-slate-500">Hechas</button>
            </div>

            <ul id="taskList" class="divide-y divide-slate-100 min-h-[250px] mb-2"></ul>
        </div>
    </div>

    <!-- Modal Materias -->
    <div id="subjectModal" class="modal-overlay fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 items-end md:items-center justify-center p-0 md:p-4">
        <div class="bg-white rounded-t-3xl md:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden animate-in slide-in-from-bottom duration-300">
            <div class="p-5 border-b flex items-center justify-between">
                <h3 class="text-lg font-black text-slate-800">Materias</h3>
                <button id="closeSubjectBtn" class="p-2 bg-slate-100 text-slate-500 rounded-full active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="p-6 pb-10 md:pb-6">
                <div class="space-y-4 mb-6">
                    <input type="text" id="subjectNameInput" placeholder="Nombre (ej. Física)" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-slate-900 text-sm font-medium">
                    <div class="flex justify-between gap-2 px-1" id="colorPicker"></div>
                    <button id="saveSubjectBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-black active:scale-[0.98] transition-all shadow-xl shadow-slate-200">Guardar Materia</button>
                </div>
                <div id="subjectsList" class="max-h-60 overflow-y-auto space-y-2 pr-1 custom-scroll"></div>
            </div>
        </div>
    </div>

    <script>
        const COLORS = [
            { id: 1, bg: 'bg-slate-200', text: 'text-slate-800', border: 'border-slate-300' },
            { id: 2, bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-200' },
            { id: 3, bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200' },
            { id: 4, bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-rose-200' },
            { id: 5, bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-200' }
        ];

        let tasks = JSON.parse(localStorage.getItem('edu_tasks')) || [];
        let subjects = JSON.parse(localStorage.getItem('edu_subjects')) || [];
        let notifiedTasks = new Set();
        let currentFilter = 'all';
        let selectedColor = COLORS[0];

        // --- NOTIFICACIONES ---
        function checkNotifPermission() {
            if ("Notification" in window && Notification.permission === "granted") {
                document.getElementById('notifStatus').classList.remove('hidden');
            }
        }

        async function requestNotif() {
            if (!("Notification" in window)) return;
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('notifStatus').classList.remove('hidden');
                new Notification("EduControl", { body: "Notificaciones móviles activas 📱" });
            }
        }

        function checkDeadlines() {
            if (!("Notification" in window) || Notification.permission !== "granted") return;
            const today = new Date();
            today.setHours(0,0,0,0);

            tasks.forEach(t => {
                if (t.completed || !t.dueDate || notifiedTasks.has(t.id)) return;
                const target = new Date(t.dueDate);
                target.setHours(0,0,0,0);
                const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));

                if (diff === 1 || diff === 0) {
                    new Notification("Recordatorio", {
                        body: diff === 1 ? `Mañana vence: ${t.text}` : `¡Hoy vence!: ${t.text}`,
                        tag: t.id
                    });
                    notifiedTasks.add(t.id);
                }
            });
        }

        // --- RENDER ---
        function renderTasks() {
            const list = document.getElementById('taskList');
            const filtered = tasks.filter(t => {
                if (currentFilter === 'pending') return !t.completed;
                if (currentFilter === 'completed') return t.completed;
                return true;
            });

            list.innerHTML = filtered.length === 0 
                ? '<div class="p-16 text-center text-slate-300 text-sm font-medium italic">No hay tareas aquí</div>'
                : filtered.map(t => {
                    const sub = subjects.find(s => s.id === t.subjectId);
                    return `
                        <li class="p-4 flex items-center justify-between group active:bg-slate-50 transition-colors">
                            <div class="flex items-center gap-4 flex-1">
                                <button onclick="toggleTask('${t.id}')" class="p-1 transition-all ${t.completed ? 'text-slate-900' : 'text-slate-200 active:scale-125'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        ${t.completed ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>' : '<circle cx="12" cy="12" r="10"></circle>'}
                                    </svg>
                                </button>
                                <div class="overflow-hidden">
                                    <p class="font-bold text-sm truncate max-w-[180px] sm:max-w-none ${t.completed ? 'task-completed' : 'text-slate-700'}">${t.text}</p>
                                    <div class="flex items-center gap-2 mt-1">
                                        ${sub ? `<span class="text-[9px] font-black px-1.5 py-0.5 rounded border uppercase tracking-tighter ${sub.color.bg} ${sub.color.text} ${sub.color.border}">${sub.name}</span>` : ''}
                                        ${t.dueDate ? `<span class="text-[9px] font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded uppercase tracking-tighter">${t.dueDate.split('-').reverse().join('/')}</span>` : ''}
                                    </div>
                                </div>
                            </div>
                            <button onclick="deleteTask('${t.id}')" class="p-3 text-slate-300 hover:text-red-500 active:scale-90 transition-all opacity-100 md:opacity-0 group-hover:opacity-100">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </li>
                    `;
                }).join('');
            
            updateStats();
        }

        function renderSubjects() {
            const select = document.getElementById('subjectSelect');
            const list = document.getElementById('subjectsList');
            
            select.innerHTML = '<option value="">Materia</option>' + subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            list.innerHTML = subjects.map(s => `
                <div class="flex items-center justify-between p-4 rounded-2xl border ${s.color.bg} ${s.color.border} active:scale-[0.98] transition-all">
                    <span class="font-black text-xs uppercase tracking-widest ${s.color.text}">${s.name}</span>
                    <button onclick="deleteSubject('${s.id}')" class="text-slate-400 p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const done = tasks.filter(t => t.completed).length;
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('progressCircle').setAttribute('stroke-dasharray', `${percent}, 100`);
            document.getElementById('progressText').innerText = `${percent}%`;
            document.getElementById('statsSubtitle').innerText = `${done} de ${total} completadas`;
        }

        // --- ACCIONES ---
        document.getElementById('addTaskBtn').onclick = () => {
            const txt = document.getElementById('taskInput');
            if (!txt.value.trim()) return;
            
            // Vibración táctil si el navegador lo soporta
            if (window.navigator.vibrate) window.navigator.vibrate(50);

            tasks.unshift({
                id: Date.now().toString(),
                text: txt.value.trim(),
                completed: false,
                dueDate: document.getElementById('dateInput').value || null,
                subjectId: document.getElementById('subjectSelect').value || null
            });
            txt.value = '';
            saveAndRender();
        };

        document.getElementById('saveSubjectBtn').onclick = () => {
            const name = document.getElementById('subjectNameInput');
            if (!name.value.trim()) return;
            subjects.push({ id: Date.now().toString(), name: name.value.trim(), color: selectedColor });
            name.value = '';
            saveAndRender();
            renderSubjects();
        };

        window.toggleTask = (id) => { 
            if (window.navigator.vibrate) window.navigator.vibrate(20);
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t); 
            saveAndRender(); 
        };
        
        window.deleteTask = (id) => { tasks = tasks.filter(t => t.id !== id); saveAndRender(); };
        window.deleteSubject = (id) => { subjects = subjects.filter(s => s.id !== id); saveAndRender(); renderSubjects(); };

        function saveAndRender() {
            localStorage.setItem('edu_tasks', JSON.stringify(tasks));
            localStorage.setItem('edu_subjects', JSON.stringify(subjects));
            renderTasks();
        }

        // --- INIT ---
        document.getElementById('colorPicker').innerHTML = COLORS.map(c => `
            <button onclick="updateColor(this, ${c.id})" class="w-10 h-10 rounded-full border-4 border-white shadow-sm ring-1 ring-slate-100 transition-all ${c.bg}"></button>
        `).join('');

        window.updateColor = (btn, id) => {
            selectedColor = COLORS[id-1];
            document.querySelectorAll('#colorPicker button').forEach(b => b.classList.remove('ring-slate-900', 'scale-110'));
            btn.classList.add('ring-slate-900', 'scale-110');
        };

        document.getElementById('filters').onclick = (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            currentFilter = e.target.dataset.filter;
            document.querySelectorAll('#filters button').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-500');
            });
            e.target.classList.add('bg-slate-900', 'text-white');
            renderTasks();
        };

        document.getElementById('openSubjectBtn').onclick = () => {
            document.getElementById('subjectModal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Evita scroll de fondo
        };
        
        document.getElementById('closeSubjectBtn').onclick = () => {
            document.getElementById('subjectModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };
        
        document.getElementById('requestNotifBtn').onclick = requestNotif;

        // Iniciar con el primer color seleccionado visualmente
        updateColor(document.getElementById('colorPicker').children[0], 1);
        
        renderTasks();
        renderSubjects();
        checkNotifPermission();
        setInterval(checkDeadlines, 30000);
        setTimeout(checkDeadlines, 1000);
    </script>
</body>
</html>
